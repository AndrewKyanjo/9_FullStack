<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                        "on-primary-fixed": "#001848",
                        "secondary-container": "#d4e0f8",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#d8e2ff",
                        "on-secondary-fixed": "#101c2d",
                        "primary": "#003d9b",
                        "surface-variant": "#d8e2ff",
                        "tertiary-container": "#0058b6",
                        "surface-container-low": "#f1f3ff",
                        "on-tertiary-fixed-variant": "#004590",
                        "secondary": "#535f73",
                        "surface": "#faf9ff",
                        "surface-container-high": "#e1e8ff",
                        "surface-bright": "#faf9ff",
                        "outline-variant": "#c3c6d6",
                        "secondary-fixed": "#d7e3fb",
                        "on-background": "#051a3e",
                        "background": "#faf9ff",

                        "tertiary": "#00418a",

                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",

                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xxl": "48px",
                        "lg": "24px",
                        "unit": "4px",
                        "gutter": "24px",

                },
            },
        }

<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card-shadow {
            box-shadow: 0px 1px 3px rgba(9, 30, 66, 0.13), 0px 8px 16px -4px rgba(9, 30, 66, 0.08);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-gutter py-xxl relative overflow-hidden">
<!-- Minimalist Background Decoration -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30%] h-[30%] bg-tertiary-container/10 rounded-full blur-[100px]"></div>
</div>
<!-- Login Card -->
<div class="z-10 w-full max-w-[440px] bg-surface-container-lowest border border-outline-variant rounded-lg p-xl login-card-shadow">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-primary flex items-center justify-center rounded-lg mb-md">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="shield_person">shield_person</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary">UserPortal</h1>
<p class="font-body-md text-body-md text-secondary mt-xs">Secure Enterprise Management</p>
</div>
<!-- Login Form -->
<form class="space-y-lg" id="loginForm">
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-11 pr-md py-md font-body-md text-body-md focus:ring-0 focus:border-primary-container focus:border-2 transition-all outline-none" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline underline-offset-4 transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-11 pr-11 py-md font-body-md text-body-md focus:ring-0 focus:border-primary-container focus:border-2 transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface-variant transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center space-x-sm">
<input class="w-4 h-4 text-primary bg-surface-container border-outline-variant rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-secondary select-none" for="remember">Stay signed in for 30 days</label>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-md rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm group" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-xl pt-xl border-t border-outline-variant flex flex-col items-center gap-md">
<p class="font-body-md text-body-md text-secondary">New to the portal?</p>
<button class="w-full border border-outline-variant text-secondary font-label-md text-label-md py-md rounded-lg hover:bg-surface-container-low transition-colors">
                    Request Platform Access
                </button>
</div>
</div>
</main>
<!-- Shared Component: Footer (Applied from JSON) -->
<footer class="w-full py-md mt-auto bg-surface-container-low border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center px-margin max-w-7xl mx-auto gap-md">
<span class="font-label-sm text-label-sm font-semibold text-secondary">© 2024 Enterprise SaaS Inc. All rights reserved.</span>
<div class="flex flex-wrap justify-center gap-gutter">
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors underline-offset-4" href="#">Privacy Policy</a>
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors underline-offset-4" href="#">Terms of Service</a>
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors underline-offset-4" href="#">Security</a>
<a class="font-caption text-caption text-on-surface-variant hover:text-primary transition-colors underline-offset-4" href="#">Cookie Settings</a>
</div>
</div>
</footer>
<script>
        // Password visibility toggle
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = toggleBtn.querySelector('span');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Simple form handling
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            const originalContent = submitBtn.innerHTML;
            
            // Visual feedback for interaction
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]" data-icon="progress_activity">progress_activity</span> Authenticating...';
            
            setTimeout(() => {
                // Mock success/redirection
                submitBtn.innerHTML = '<span class="material-symbols-outlined text-[18px]" data-icon="check_circle">check_circle</span> Welcome back';
                submitBtn.classList.replace('bg-primary-container', 'bg-tertiary-container');
                
                setTimeout(() => {
                    console.log('Redirecting to dashboard...');
                    // In a real app: window.location.href = '/dashboard';
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
